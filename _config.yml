# ====== 网站基础信息 ======
title: 我的个人博客
description: 记录生活，分享思考
url: "https://morningligt.github.io"

# ====== 主题设置 ======
theme: jekyll-theme-cayman

# ====== 时区设置 ======
timezone: Asia/Shanghai

# ====== 文章链接格式（缺了这行，文章就显示不出来） ======
permalink: /:year/:month/:day/:title/

# ====== 文章显示设置 ======
show_excerpts: true

# 顶部导航菜单
header_pages:
  - index.md        # 首页（默认就有）
  - about.md        # 关于我
  - categories.md  # 分类
  # - categories.md  # 如果你想加分类页，取消注释并创建对应文件

